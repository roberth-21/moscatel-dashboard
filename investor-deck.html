<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moscatel Perú · The Living Agents</title>
<style>
  :root{
    --vino:#6B1F2A; --vino2:#8B2635; --oro:#B8860B; --oro2:#D9A93B;
    --crema:#F5ECD7; --ink:#140C10; --ink2:#1F1117; --card:#241620;
    --green:#3FA66A; --amber:#E0A33A; --red:#D9534F; --blue:#4A90C4;
    --line:rgba(216,169,59,.16); --text:#EFE6D6; --dim:#A89684;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);overflow:hidden;
    background:
      radial-gradient(1200px 600px at 80% -5%, rgba(139,38,53,.30), transparent),
      radial-gradient(900px 500px at -10% 100%, rgba(184,134,11,.12), transparent),
      var(--ink);
  }
  .deck{width:100vw;height:100vh;position:relative}
  .slide{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .5s ease;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:54px 6vw 90px;overflow-y:auto}
  .slide.active{opacity:1;pointer-events:all}
  .inner{width:100%;max-width:1100px}
  .eyebrow{font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:var(--oro);font-weight:600;margin-bottom:14px}
  h1{font-size:clamp(34px,6vw,60px);font-weight:200;letter-spacing:-.02em;line-height:1.06}
  h1 b{font-weight:700;color:var(--oro2)}
  h2{font-size:clamp(24px,4vw,38px);font-weight:300;line-height:1.1}
  h2 b{font-weight:700;color:var(--oro2)}
  .lead{color:var(--dim);font-size:17px;max-width:680px;margin-top:18px}

  /* NAV */
  .ctrl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:16px;
    background:rgba(31,17,23,.85);border:1px solid var(--line);border-radius:100px;padding:8px 14px;backdrop-filter:blur(8px)}
  .ctrl button{background:var(--card);border:1px solid var(--line);color:var(--text);width:38px;height:38px;border-radius:50%;
    cursor:pointer;font-size:18px;transition:.15s}
  .ctrl button:hover{border-color:var(--oro);color:var(--oro2)}
  .counter{font-size:13px;color:var(--dim);min-width:70px;text-align:center;font-variant-numeric:tabular-nums}
  .dots{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:6px;flex-wrap:wrap;max-width:80vw;justify-content:center}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(216,169,59,.22);cursor:pointer;transition:.2s}
  .dot:hover,.dot.on{background:var(--oro);transform:scale(1.3)}
  .pgtitle{position:fixed;top:30px;left:6vw;z-index:60;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}

  /* VALUES / DNA */
  .dna{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:30px}
  .dna-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px}
  .dna-card h3{color:var(--oro2);font-size:17px;margin-bottom:8px}
  .dna-card p{color:var(--dim);font-size:14px}
  .values{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:26px}
  .val{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;transition:.2s}
  .val:hover{border-color:var(--oro);transform:translateY(-3px)}
  .val .ic{font-size:28px;margin-bottom:6px}
  .val h4{font-size:13px;color:var(--oro2)}
  .val .r{font-size:10px;color:var(--vino2);font-weight:700}
  .val p{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.4}

  /* RULES TABLE */
  .rules{margin-top:24px;width:100%;border-collapse:collapse}
  .rules th,.rules td{padding:11px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
  .rules th{color:var(--oro);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .rules td:first-child{font-weight:700;color:var(--oro2)}

  /* CHAIN */
  .chain{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:30px}
  .chain .node{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;text-align:center;min-width:104px}
  .chain .node .e{font-size:26px}
  .chain .node .n{font-size:12px;margin-top:4px}
  .chain .arrow{color:var(--oro);font-size:18px}

  /* TEAM */
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:30px}
  .acard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;transition:.25s;text-align:center}
  .acard:hover{transform:translateY(-5px);border-color:var(--ac)}
  .acard .av{width:74px;height:74px;margin:0 auto 12px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:38px;background:var(--ac-soft);border:1px solid var(--ac)}
  .acard h3{font-size:16px;margin-bottom:2px}
  .acard .role{font-size:11px;color:var(--dim);font-style:italic}
  .acard .rule{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;color:#fff;background:var(--ac);padding:3px 11px;border-radius:100px}

  /* AGENT LAB SLIDE */
  .agentslide{--ac:#8B2635;--ac-soft:rgba(139,38,53,.18)}
  .lab-head{display:flex;align-items:center;gap:22px;margin-bottom:20px;flex-wrap:wrap}
  .lab-av{width:120px;height:120px;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:64px;
    background:var(--ac-soft);border:2px solid var(--ac);flex-shrink:0;transition:.4s}
  .lab-av.shake{animation:shake .5s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px) rotate(-4deg)}60%{transform:translateX(7px) rotate(4deg)}}
  .lab-av.pulse{animation:pulse .6s}
  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
  .lab-id{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ac);font-weight:600}
  .lab-head h2{font-size:30px;margin:2px 0}
  .mood{font-size:15px;color:var(--dim);font-style:italic;transition:.3s;max-width:440px}
  .labgrid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  @media(max-width:820px){.labgrid{grid-template-columns:1fr}.dna{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .panel h4{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
  label.fl{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
  select{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--text);padding:12px;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:14px}
  select:focus{outline:none;border-color:var(--oro)}
  .btn{width:100%;background:linear-gradient(135deg,var(--ac),var(--oro2));color:#fff;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .meta{font-size:12px;color:var(--dim);margin-top:12px}
  .meta b{color:var(--text)}
  .persona{font-size:13px;color:var(--dim);margin-top:14px;line-height:1.5}
  .persona b{color:var(--ac)}

  .verdict{display:none}
  .verdict.show{display:block;animation:fade .4s}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .vhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .vscore{font-size:40px;font-weight:800;line-height:1}
  .vbadge{padding:6px 16px;border-radius:100px;font-weight:700;font-size:13px}
  .b-AP{background:rgba(63,166,106,.18);color:#7FD9A4}
  .b-OB{background:rgba(224,163,58,.18);color:#F0C475}
  .b-RE{background:rgba(217,83,79,.18);color:#F0918E}
  .b-ER{background:rgba(140,140,140,.18);color:#bbb}
  .dim-bar{margin-bottom:10px}
  .dim-bar .r{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .track{height:7px;background:var(--ink);border-radius:100px;overflow:hidden}
  .fill{height:100%;border-radius:100px;transition:width .7s ease}
  .behavior{background:linear-gradient(180deg,var(--ac-soft),transparent);border:1px solid var(--line);border-radius:10px;padding:13px;margin-top:14px;font-size:13px}
  .behavior b{color:var(--ac)}
  .vcomment{background:var(--ink);border-left:3px solid var(--ac);border-radius:8px;padding:12px 14px;margin-top:12px;font-size:13px}
  .loading{text-align:center;padding:24px;color:var(--dim)}
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--oro);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* READY */
  .ready{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;text-align:center}
  .rcard .ic{font-size:28px;margin-bottom:10px}
  .rcard h4{color:var(--oro2);font-size:15px;margin-bottom:6px}
  .rcard p{color:var(--dim);font-size:13px}
  /* DECISION BOX */
  .decision-box{background:var(--ink);border:1px solid;border-radius:10px;padding:12px 14px;margin-bottom:16px}
  .dec-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
  .dec-value{font-size:17px;font-weight:700}

  /* WORLD SCENARIOS */
  .worldgrid{display:grid;grid-template-columns:1fr 1.3fr;gap:20px;margin-top:26px}
  @media(max-width:820px){.worldgrid{grid-template-columns:1fr}}
  .wcol{display:flex;flex-direction:column;gap:12px}
  .wscen{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--wc,#888);border-radius:12px;padding:16px;cursor:pointer;transition:.2s}
  .wscen:hover{transform:translateX(3px)}
  .wscen.on{border-color:var(--wc);box-shadow:0 0 0 1px var(--wc)}
  .ws-id{font-size:10px;letter-spacing:.14em;color:var(--dim);font-family:monospace}
  .ws-name{font-size:17px;font-weight:600;margin:3px 0}
  .ws-crisis{font-size:12px;font-family:monospace}
  .chainresp{display:flex;flex-direction:column;gap:8px}
  .ci{background:var(--ink);border-left:3px solid var(--ci);border-radius:8px;padding:10px 12px}
  .ci-ag{display:inline-block;font-size:11px;font-weight:700;color:var(--ci);letter-spacing:.06em;margin-bottom:3px}
  .ci-t{display:block;font-size:13px;color:var(--text);line-height:1.45}
  .bscbox{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .bsc-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
  .bsc-row{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--dim)}
  .bsc-row b{font-size:16px}
  .bsc-global{margin-top:12px;font-size:18px;font-weight:700}
</style>
</head>

  }catch(e){v=null;}

  const g=(o,...ks)=>{for(const x of ks){if(o&&o[x]!=null)return o[x];}return null;};
  const result=v?(g(v,'resultado','RESULTADO')||'ERROR'):'ERROR';
  const total=v?Number(g(v,'puntaje_total','PUNTAJE_TOTAL')||0):0;
  const d1=v?Number(g(v,'decision_correcta','DECISION_CORRECTA')||0):0;
  const d2=v?Number(g(v,'fidelidad','FIDELIDAD')||0):0;
  const d3=v?Number(g(v,'justificacion','JUSTIFICACION')||0):0;
  const d4=v?Number(g(v,'formato','FORMATO')||0):0;
  const comment=v?(g(v,'comentario','COMENTARIO')||''):'No response. Check that n8n is active and the judge has API quota.';
  // Decision the agent actually took — specific per scenario
  const decFrase = DECISIONES[s.id] || 'tomar la acción que la cultura exige.';
  const agName = AGNAMES[k] || a.name;
  let decision;
  if(result==='APROBADO'){
    decision = `${agName} supo ${decFrase}`;
  } else if(result==='OBSERVADO'){
    decision = `${agName} logró ${decFrase} aunque con observaciones en la justificación o el formato.`;
  } else if(result==='REPROBADO'){
    decision = `${agName} NO cumplió: debía ${decFrase}`;
  } else {
    decision = 'Sin veredicto del sistema. Revisa que n8n esté activo.';
  }

  // ===== PERSONALITY CHANGE =====
  const m=moodFor(result);
  av.textContent=a.moods[m];
  mood.textContent=moodText(result);
  if(result==='REPROBADO'){av.classList.add('shake');setTimeout(()=>av.classList.remove('shake'),500);}
  else{av.classList.add('pulse');setTimeout(()=>av.classList.remove('pulse'),600);}

  const c=cls(result);
  const col=result==='APROBADO'?'var(--green)':result==='OBSERVADO'?'var(--amber)':result==='REPROBADO'?'var(--red)':'#999';
  const bar=(lab,val,max)=>`<div class="dim-bar"><div class="r"><span>${lab}</span><span>${val}/${max}</span></div><div class="track"><div class="fill" style="width:${Math.round(val/max*100)}%;background:${col}"></div></div></div>`;

  out.innerHTML=`<div class="verdict show">
    <div class="vhead">
      <div class="vscore" style="color:${col}">${total}<span style="font-size:16px;color:var(--dim)">/100</span></div>
      <span class="vbadge b-${c}">${result}</span>
    </div>
    <div class="decision-box" style="border-color:${col}">
      <div class="dec-label">Decisión que tomó el agente</div>
      <div class="dec-value" style="color:${col};font-size:15px;line-height:1.5">${decision}</div>
    </div>
    ${bar('Decisión',d1,40)}${bar('Fidelidad a reglas',d2,25)}${bar('Justificación',d3,20)}${bar('Formato y trazado',d4,15)}
    <div class="behavior"><b>Comportamiento bajo presión:</b> ${a.lines[result]||a.lines.ERROR}</div>
    ${comment?`<div class="vcomment">"${comment}"</div>`:''}
  </div>`;
  btn.disabled=false;
}

// ============ WORLD SCENARIOS (sincronizados con BSC del v16) ============
// Modificadores de fase y multiplicadores — IGUALES al Dashboard v16
const FASE_MOD={"Cosecha":{fin:0,cli:0,proc:-8,apr:4,climaMul:1.5,usdMul:0.5},
  "Tránsito":{fin:-4,cli:-6,proc:-4,apr:0,climaMul:1.0,usdMul:1.0},
  "Exportación":{fin:-8,cli:-6,proc:4,apr:0,climaMul:0.4,usdMul:1.6}};
const clamp=x=>Math.max(0,Math.min(100,Math.round(x)));
// Misma fórmula computeBSC del v16
function computeBSC(w){
  const m=FASE_MOD[w.fase]||FASE_MOD["Cosecha"];
  return {fin:clamp(45+(w.fob-1.0)*22+(w.usd-3.41)*18*m.usdMul-w.crisis*4+m.fin),
          cli:clamp(w.dem*0.7+28-w.crisis*3+m.cli),
          proc:clamp(92-w.clima*0.4*m.climaMul-w.crisis*3.2+m.proc),
          apr:clamp(78-w.crisis*2.2+m.apr)};
}

function bscBadge(b){
  const avg=Math.round((b.fin+b.cli+b.proc+b.apr)/4);
  const col=avg>=70?'var(--green)':avg>=45?'var(--amber)':'var(--red)';
  const dot=avg>=70?'🟢':avg>=45?'🟡':'🔴';
  return {avg,col,dot};
}

function renderWorld(){
  const list=document.getElementById('worldList');
  if(!list)return;
  list.innerHTML=WORLD.map((s,i)=>{
    const b=bscBadge(computeBSC(s.world));
    return `<div class="wscen ${i===0?'on':''}" data-i="${i}" onclick="selWorld(${i})" style="--wc:${s.color}">
      <div class="ws-id">ESCENARIO ${s.id}</div>
      <div class="ws-name">${s.name}</div>
      <div class="ws-crisis" style="color:${s.color}">${b.dot} Crisis ${s.crisis}/10 · BSC esperado ${b.avg}</div>
    </div>`;}).join('');
  selWorld(0);
}
function selWorld(i){
  const s=WORLD[i];
  document.querySelectorAll('.wscen').forEach(e=>e.classList.toggle('on',+e.dataset.i===i));
  const b=computeBSC(s.world);const bb=bscBadge(b);
  const items=s.chain.map(r=>`<div class="ci" style="--ci:${r.c}"><span class="ci-ag">${r.ag}</span><span class="ci-t">${r.t}</span></div>`).join('');
  document.getElementById('worldPanel').innerHTML=`
    <h3 style="margin-bottom:14px">${s.name}</h3>
    <div class="chainresp">${items}</div>
    <div class="bscbox">
      <div class="bsc-label">BSC ESPERADO (fórmula del dashboard)</div>
      <div class="bsc-row">
        <span>Financiera <b style="color:${b.fin>=70?'var(--green)':b.fin>=45?'var(--amber)':'var(--red)'}">${b.fin}</b></span>
        <span>Cliente <b style="color:${b.cli>=70?'var(--green)':b.cli>=45?'var(--amber)':'var(--red)'}">${b.cli}</b></span>
        <span>Procesos <b style="color:${b.proc>=70?'var(--green)':b.proc>=45?'var(--amber)':'var(--red)'}">${b.proc}</b></span>
        <span>Aprendizaje <b style="color:${b.apr>=70?'var(--green)':b.apr>=45?'var(--amber)':'var(--red)'}">${b.apr}</b></span>
      </div>
      <div class="bsc-global" style="color:${bb.col}">${bb.dot} BSC Global ${bb.avg}/100</div>
    </div>`;
}
